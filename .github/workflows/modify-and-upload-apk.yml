            }).then(r => r.data).catch(e => { core.setFailed('No latest release'); throw e});
            core.info(`Found release: ${release.tag_name}`);
            const assets = release.assets || [];
            const match = assets.find(a => {
              const n = (a.name || '').toLowerCase();
              return n.includes('x piko') || n.includes('xpiko') || n.includes('x_piko');
            });
            if (!match) {
              core.setFailed('No release asset matching "x piko" found.');
            } else {
              return { url: match.browser_download_url, name: match.name, release_id: release.id, release_tag: release.tag_name };
            }

